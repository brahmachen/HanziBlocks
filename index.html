<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>汉字乐高 - V4 终极爽感版 (修复完美版)</title>
    <style>
        body { margin: 0; padding: 0; overflow: hidden; background-color: #f5f4ef; display: flex; justify-content: center; align-items: center; height: 100vh; }
        canvas { box-shadow: 0 20px 50px rgba(0,0,0,0.1); border-radius: 12px; cursor: grab; }
        canvas:active { cursor: grabbing; }
        
        /* 【新增】开始游戏遮罩屏 */
        #startOverlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(245, 244, 239, 0.9); z-index: 1000; display: flex; flex-direction: column; justify-content: center; align-items: center; backdrop-filter: blur(5px); }
        #startTitle { font-family: "PingFang SC", "Microsoft YaHei", sans-serif; font-size: 48px; color: #2c3e50; font-weight: bold; margin-bottom: 20px; text-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        #startSub { font-family: sans-serif; font-size: 18px; color: #7f8c8d; margin-bottom: 40px; }
        #startBtn { padding: 15px 40px; font-size: 24px; font-weight: bold; font-family: sans-serif; background: #e67e22; border: none; border-radius: 30px; cursor: pointer; box-shadow: 0 10px 20px rgba(230, 126, 34, 0.3); color: white; transition: all 0.2s; }
        #startBtn:hover { transform: translateY(-3px) scale(1.05); box-shadow: 0 15px 25px rgba(230, 126, 34, 0.4); background: #d35400; }
        #startBtn:active { transform: translateY(0) scale(0.95); }
        
        #hint { display: none; } /* 废弃旧的纯文字提示 */
        #restartBtn { position: absolute; top: 20px; right: 20px; padding: 10px 20px; font-size: 16px; font-weight: bold; font-family: sans-serif; background: #fff; border: 2px solid #e0ddd3; border-radius: 20px; cursor: pointer; box-shadow: 0 4px 10px rgba(0,0,0,0.05); color: #7f8c8d; transition: all 0.2s; z-index: 10; display: none; } /* 初始隐藏，开始后显示 */
        #restartBtn:hover { transform: translateY(-2px); box-shadow: 0 6px 15px rgba(0,0,0,0.1); color: #d35400; border-color: #d35400; }
        #restartBtn:active { transform: translateY(0); }
        #debugLog { display: none !important; } /* 隐藏调试日志 */
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pixi.js/7.3.2/pixi.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/matter-js/0.19.0/matter.min.js"></script>
</head>
<body>
    <!-- 【新增】开始游戏遮罩屏 -->
    <div id="startOverlay">
        <div id="startTitle">汉字积木</div>
        <div id="startSub">拖拽部首，拼出神奇汉字！</div>
        <button id="startBtn" onclick="startGame()">开始游戏</button>
    </div>

    <button id="restartBtn" onclick="location.reload()">↺ 重新开始</button>
    <div id="debugLog"></div>
<script>
function startGame() {
    // 隐藏遮罩，显示重新开始按钮
    document.getElementById('startOverlay').style.display = 'none';
    document.getElementById('restartBtn').style.display = 'block';
    
    // 初始化并激活音频引擎 (完美符合用户主动点击的现代浏览器规范)
    initAudio();
}

function logOnScreen(msg, isError = false) {
    const logDiv = document.getElementById('debugLog');
    logDiv.style.display = 'block';
    const line = document.createElement('div');
    line.textContent = `[LOG] ${msg}`;
    if (isError) line.style.color = '#f1c40f';
    logDiv.appendChild(line);
    logDiv.scrollTop = logDiv.scrollHeight;
    console.log(msg);
}

// ==========================================
// 1. 纯代码音效引擎
// ==========================================
const AudioContext = window.AudioContext || window.webkitAudioContext;
let audioCtx;

function initAudio() {
    logOnScreen(`initAudio triggered`);
    try {
        if (!audioCtx) {
            audioCtx = new AudioContext();
            logOnScreen(`AudioContext created. State: ${audioCtx.state}`);
        }
        if (audioCtx.state === 'suspended') {
            audioCtx.resume().then(() => logOnScreen(`AudioContext resumed successfully.`));
        } else {
            logOnScreen(`AudioContext already running.`);
        }
        
        // 尝试播放一个极短、极小声的静音，强行激活iOS设备上的硬件引擎通道
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        gain.gain.value = 0.001;
        osc.connect(gain);
        gain.connect(audioCtx.destination);
        osc.start();
        osc.stop(audioCtx.currentTime + 0.01);
        
    } catch (e) {
        logOnScreen(`initAudio Error: ${e.message}`, true);
    }
}

// 【废弃旧的全局监听拦截法】改用标准的“开始游戏”按钮触发
// document.addEventListener('pointerdown', initAudio, { capture: true, once: true });
// document.addEventListener('touchstart', initAudio, { capture: true, once: true });
// document.addEventListener('click', initAudio, { capture: true, once: true });

function playTone(freq, type, duration, vol=0.1) {
    if (!audioCtx) return;
    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();
    osc.type = type;
    osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
    gain.gain.setValueAtTime(vol, audioCtx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + duration);
    osc.connect(gain);
    gain.connect(audioCtx.destination);
    osc.start();
    osc.stop(audioCtx.currentTime + duration);
}

function playSnapSound() {
    // 【修改】悦耳的木琴/水滴声 (清脆的高频，完美五度和弦 C5 + G5)
    // 听起来像非常Q弹的 "Bloop!" 或者高级UI里的清脆提示音
    playTone(523.25, 'sine', 0.1, 0.5);  // C5
    playTone(783.99, 'sine', 0.15, 0.3); // G5
}

// 【新增】错误/未吸附时的“噗”声 (木块掉落地板/无反应的短促低音)
function playDropSound() {
    playTone(150, 'square', 0.05, 0.15); // 非常短促且沉闷的“嗒”声，不会引起反感
}

function playWinSound() {
    playTone(523.25, 'sine', 0.5, 0.3);
    setTimeout(() => playTone(659.25, 'sine', 0.5, 0.3), 100);
    setTimeout(() => playTone(783.99, 'sine', 0.8, 0.4), 200);
}

function speakWord(text) {
    if (!window.speechSynthesis) return;
    const utterance = new SpeechSynthesisUtterance(text);
    utterance.lang = 'zh-CN';
    utterance.rate = 0.8;
    utterance.pitch = 1.2;
    window.speechSynthesis.speak(utterance);
}

// ==========================================
// 2. 基础游戏逻辑初始化 (完全复用 V3 的完美对齐)
// ==========================================
const svgRiPath = `<path d="M 200 200 L 200 800 L 450 800 L 450 200 Z M 200 500 L 450 500" stroke="#ffffff" stroke-width="60" fill="none" stroke-linecap="round" stroke-linejoin="round"/>`;
const svgYuePath = `<path d="M 600 200 Q 550 500 500 900 M 600 200 Q 800 150 850 200 L 850 800 Q 800 900 700 850 M 600 450 L 820 450 M 600 650 L 820 650" stroke="#ffffff" stroke-width="60" fill="none" stroke-linecap="round" stroke-linejoin="round"/>`;
// 强行转交 Canvas 绘制而不是直接读 Base64
const createSVGDataURI = (paths) => {
    try {
        const svgStr = `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" width="1024" height="1024">${paths}</svg>`;
        const blob = new Blob([svgStr], {type: 'image/svg+xml'});
        const url = URL.createObjectURL(blob);
        logOnScreen(`生成 Blob URL 成功: ${url.substring(0, 30)}...`);
        return url;
    } catch(e) {
        logOnScreen(`SVG Blob生成失败: ${e.message}`, true);
        return "";
    }
};

const { Engine, Bodies, Composite, Mouse, MouseConstraint } = Matter;
const engine = Engine.create();
const app = new PIXI.Application({ width: 800, height: 600, backgroundColor: 0xf5f4ef, antialias: true });
document.body.appendChild(app.view);

const ground = Bodies.rectangle(400, 610, 810, 60, { isStatic: true });
const leftWall = Bodies.rectangle(-10, 300, 60, 610, { isStatic: true });
const rightWall = Bodies.rectangle(810, 300, 60, 610, { isStatic: true });
Composite.add(engine.world, [ground, leftWall, rightWall]);

const VISUAL_SIZE = 200; 
const TARGET_CX = 400;
const TARGET_CY = 300;

const targetBox = new PIXI.Graphics();
targetBox.lineStyle(4, 0xe0ddd3, 1, 0.5, true);
targetBox.drawRoundedRect(-VISUAL_SIZE/2, -VISUAL_SIZE/2, VISUAL_SIZE, VISUAL_SIZE, 10);
targetBox.x = TARGET_CX; targetBox.y = TARGET_CY;
app.stage.addChild(targetBox);

function createVectorPiece(svgString, startX, startY, isLeftPart) {
    const bodyWidth = VISUAL_SIZE / 2;
    const bodyHeight = VISUAL_SIZE;
    const snapTarget = { x: isLeftPart ? TARGET_CX - bodyWidth/2 : TARGET_CX + bodyWidth/2, y: TARGET_CY };

    // 使用 PIXI 官方推荐的异步 SVG 加载方式解决 V7 渲染层级问题
    const body = Bodies.rectangle(startX, startY, bodyWidth, bodyHeight, { restitution: 0.2, friction: 0.1, density: 0.05 });
    
    // 退回 V3 的原生 Sprite，保证对齐和缩放绝对不出错
    const sprite = new PIXI.Sprite();
    
    // 【新增】目标槽位预判虚影 (Ghost Slot)
    const ghostSprite = new PIXI.Sprite();
    ghostSprite.tint = 0x95a5a6; // 一种类似铅笔手稿/水痕的浅灰色
    ghostSprite.alpha = 0; // 初始完全隐藏

    // 【新增】创建一个专门用于渲染阴影的 Sprite
    const shadowSprite = new PIXI.Sprite();
    shadowSprite.tint = 0x1a252f; // 使用深藏青/深褐色代替纯黑，避免在米色背景上显得像脏灰
    shadowSprite.alpha = 0; // 初始完全透明，由动画缓动控制
    shadowSprite.visible = true;

    // 将阴影和本体都放进一个容器，这样物理引擎的旋转能同时作用于两者
    const container = new PIXI.Container();
    container.addChild(shadowSprite);
    container.addChild(sprite);
    
    // 使用浏览器原生 Image 对象加载，完美绕过 Pixi V7 对 Blob URL 扩展名的猜测！
    const url = createSVGDataURI(svgString);
    logOnScreen(`开始原生Image加载: isLeft=${isLeftPart}`);
    
    const img = new Image();
    img.onload = () => {
        logOnScreen(`原生Image加载成功: isLeft=${isLeftPart}, 尺寸 ${img.width}x${img.height}`);
        sprite.texture = PIXI.Texture.from(img);
        sprite.width = VISUAL_SIZE; sprite.height = VISUAL_SIZE;
        sprite.anchor.set(isLeftPart ? 0.25 : 0.75, 0.5);

        // 阴影共享一样的尺寸和锚点，并偏移产生立体感 (光线从正上方直射，带一点点高度感)
        shadowSprite.texture = sprite.texture;
        shadowSprite.width = VISUAL_SIZE; shadowSprite.height = VISUAL_SIZE;
        shadowSprite.anchor.set(isLeftPart ? 0.25 : 0.75, 0.5);
        shadowSprite.x = 0; shadowSprite.y = 15; // 阴影改到正下方
        
        // 【核心优化】使用 PixiJS 内置的高斯模糊滤镜 (Gaussian Blur)，让阴影边缘彻底柔和，告别硬边界！
        const blurFilter = new PIXI.filters.BlurFilter();
        blurFilter.blur = 10;      // 模糊扩散半径 (数值越大越柔和)
        blurFilter.quality = 3;    // 渲染质量拉满
        shadowSprite.filters = [blurFilter];

        // 同理配置槽位预判的虚影，并锁定在目标槽位的位置
        ghostSprite.texture = sprite.texture;
        ghostSprite.width = VISUAL_SIZE; ghostSprite.height = VISUAL_SIZE;
        ghostSprite.anchor.set(isLeftPart ? 0.25 : 0.75, 0.5);
        ghostSprite.x = snapTarget.x; 
        ghostSprite.y = snapTarget.y; 
        // 预判虚影原本是纯白，我们用 Tint 染成铅笔灰色
        ghostSprite.tint = 0x95a5a6;

        body.customData.baseScaleX = sprite.scale.x;
        body.customData.baseScaleY = sprite.scale.y;
        
        // 【核心渲染逻辑】：初始把白色的原版 SVG 染色为深邃的藏青色/黑灰色，因为 Tint 是正片叠底，所以必须基于白色
        sprite.tint = 0x2c3e50;
    };
    img.onerror = () => {
        logOnScreen(`原生Image加载失败: isLeft=${isLeftPart}`, true);
    };
    img.src = url;

    app.stage.addChild(ghostSprite); // 槽位虚影放在底层
    app.stage.addChild(container);
    body.customData = { sprite, shadowSprite, ghostSprite, container, snapTarget, isSnapped: false, baseScaleX: 1, baseScaleY: 1, bounceAnim: 0, isDragged: false, targetShadowAlpha: 0 };
    Composite.add(engine.world, body);
    return body;
}

const pieceRi = createVectorPiece(svgRiPath, 200, 100, true);
const pieceYue = createVectorPiece(svgYuePath, 600, 150, false);
const pieces = [pieceRi, pieceYue];

const mConstraint = MouseConstraint.create(engine, {
    mouse: Mouse.create(app.view),
    constraint: { stiffness: 0.2, render: { visible: false } }
});
Composite.add(engine.world, mConstraint);

// 拖拽时顺便激活音频，并禁止拖动已经吸附的积木
Matter.Events.on(mConstraint, 'startdrag', (event) => {
    initAudio();
    if (event.body && event.body.customData) {
        if (event.body.customData.isSnapped) {
            mConstraint.body = null;
        } else {
            // 【新增】开始拖拽：标记状态，阴影设定目标透明度并置顶
            event.body.customData.isDragged = true;
            event.body.customData.targetShadowAlpha = 0.4; // 抓起时因为有模糊效果，透明度可以稍微提高一点来凸显立体感
            app.stage.addChild(event.body.customData.container); // 移到顶层显示
            
            // 抓起瞬间的【魔法变色与粒子起爆】
            event.body.customData.sprite.tint = 0xf39c12; // 变成闪耀的魔法橙金色
            event.body.customData.shadowSprite.tint = 0xd35400; // 阴影也跟着环境光染成偏红/橙的暖色投影
            createPickupDust(event.body.position.x, event.body.position.y); // 触发底部星火飞溅
        }
    }
});

let isGameWon = false;
let winAnimTick = 0;

Matter.Events.on(mConstraint, 'enddrag', function(event) {
    const body = event.body;
    if (!body || !body.customData) return;
    
    // 【新增】结束拖拽：取消拖拽状态，重置形变，阴影设定目标透明度为0（缓动消失）
    body.customData.isDragged = false;
    body.customData.targetShadowAlpha = 0; 
    body.customData.sprite.scale.set(body.customData.baseScaleX, body.customData.baseScaleY);

    if (body.customData.isSnapped) return;
    
    // 松手时，恢复原本的墨色（除非已经赢了）
    if (!isGameWon) {
        body.customData.sprite.tint = 0x2c3e50;
        body.customData.shadowSprite.tint = 0x1a252f; // 阴影恢复深沉冷色
    }

    const target = body.customData.snapTarget;
    const dist = Math.hypot(body.position.x - target.x, body.position.y - target.y);
    
    if (dist < 60) {
        // 【核心修复之二：物理幽灵再封印】
        // 当我们拖拽积木疯狂甩动时，可能鼠标送开的瞬间虽然判定成功了，
        // 但是 Matter.js 在这中间多算了一帧的惯性，所以我们除了要把速度归零，还要把力的累加器（force）归零，
        // 并且要在下一次 render 的 tick 之前强制把视觉容器和物理坐标同步死死锁住。
        Matter.Body.setStatic(body, true);
        
        Matter.Body.setVelocity(body, { x: 0, y: 0 });
        Matter.Body.setAngularVelocity(body, 0);
        Matter.Body.setAngle(body, 0);
        
        // 甚至清空它的物理外力累加
        Matter.Body.applyForce(body, body.position, {x: -body.force.x, y: -body.force.y}); 

        // 强行把它瞬间拍到那个靶心位置，一毫米都不许差！
        Matter.Body.setPosition(body, target);
        
        body.customData.isSnapped = true;
        
        // 视觉同步锁定！直接跳过下一帧物理引擎的结算误差，强行对齐！
        body.customData.container.x = target.x;
        body.customData.container.y = target.y;
        body.customData.container.rotation = 0;
        
        playSnapSound();
        body.customData.sprite.tint = 0x34495e; 
        
        // 给它一个巨大的动画弹力值
        body.customData.bounceAnim = 1;
        playSnapSound();
        checkWinCondition();
    } else {
        // 【新增音效反馈】：如果你松手的时候不在对的地方，或者字块掉下去了，发出一声短促沉闷的木块敲击声
        playDropSound();
    }
});

// ==========================================
// 3. 粒子爆炸引擎
// ==========================================
const particles = [];
// 胜利时的大型彩色烟花
function createExplosion(x, y) {
    const colors = [0xf1c40f, 0xe74c3c, 0xe67e22, 0xffffff]; 
    for (let i = 0; i < 60; i++) {
        const p = new PIXI.Graphics();
        const color = colors[Math.floor(Math.random() * colors.length)];
        p.beginFill(color);
        p.drawCircle(0, 0, Math.random() * 6 + 3); 
        p.endFill();
        p.x = x; p.y = y;
        const angle = Math.random() * Math.PI * 2;
        const speed = Math.random() * 15 + 5;
        p.vx = Math.cos(angle) * speed;
        p.vy = Math.sin(angle) * speed;
        p.life = 1.0; 
        p.decay = Math.random() * 0.03 + 0.01; 
        app.stage.addChild(p);
        particles.push(p);
    }
}

// 抓起时的金色魔法星火飞溅
function createPickupDust(x, y) {
    for (let i = 0; i < 15; i++) {
        const p = new PIXI.Graphics();
        p.beginFill(0xf1c40f); // 纯金色
        p.drawCircle(0, 0, Math.random() * 4 + 2); 
        p.endFill();
        p.x = x; p.y = y + 30; // 从积木底部扬起
        
        // 只向上和向两边喷射
        const angle = Math.PI + (Math.random() - 0.5) * Math.PI; 
        const speed = Math.random() * 8 + 2;
        p.vx = Math.cos(angle) * speed;
        p.vy = Math.sin(angle) * speed;
        p.life = 1.0; 
        p.decay = Math.random() * 0.05 + 0.02; // 消失得更快
        app.stage.addChild(p);
        particles.push(p);
    }
}

// ==========================================
// 4. 安全的动画循环 (不再破坏原生 Scale)
// ==========================================
app.ticker.add(() => {
    Engine.update(engine, 1000 / 60);

    pieces.forEach(p => {
        p.customData.container.x = p.position.x;
        p.customData.container.y = p.position.y;
        p.customData.container.rotation = p.angle;
        
        // --- 阴影的缓动平滑过渡 (Lerp) ---
        p.customData.shadowSprite.alpha += (p.customData.targetShadowAlpha - p.customData.shadowSprite.alpha) * 0.15;
        
        // --- 【新增特效：距离感知智能槽位投影 (Proximity Ghosting)】 ---
        if (!p.customData.isSnapped && !isGameWon) {
            const dist = Math.hypot(p.position.x - p.customData.snapTarget.x, p.position.y - p.customData.snapTarget.y);
            // 只有距离目标 250 像素以内才开始显示预判虚影。
            // 当距离为 250 时，透明度是 0；当距离为 0（完美重合）时，透明度是 0.35
            const maxDist = 250;
            const targetGhostAlpha = dist < maxDist ? (1 - dist / maxDist) * 0.35 : 0;
            // 同样使用 Lerp 缓动，让槽位的浮现像水汽一样平滑自然
            p.customData.ghostSprite.alpha += (targetGhostAlpha - p.customData.ghostSprite.alpha) * 0.2;
        } else {
            // 吸附完成或游戏胜利后，隐藏槽位虚影
            p.customData.ghostSprite.alpha += (0 - p.customData.ghostSprite.alpha) * 0.2;
        }
        // ---------------------------------
        
        if (p.customData.isSnapped || isGameWon) {
            // 如果已经被吸附，或者游戏胜利，【绝对强制覆盖视觉坐标，剥夺物理引擎的控制权！】
            // 防止刚体引擎底层在计算静止刚体堆叠时产生的纳秒级漂移
            p.customData.container.x = p.customData.snapTarget.x;
            p.customData.container.y = p.customData.snapTarget.y;
            p.customData.container.rotation = 0;
            
            // 胜利时的集体弹跳 (在绝对坐标上做视觉偏移)
            if (isGameWon) {
                const bounce = Math.exp(-winAnimTick * 0.5) * Math.sin(winAnimTick * 5);
                const b = 1 + bounce * 0.2;
                p.customData.sprite.scale.set(p.customData.baseScaleX * b, p.customData.baseScaleY * b);
            } else if (p.customData.bounceAnim > 0) {
                // 单块吸附时的果冻回弹
                p.customData.bounceAnim -= 0.08; 
                const b = 1 + p.customData.bounceAnim * 0.3; 
                p.customData.sprite.scale.set(p.customData.baseScaleX * b, p.customData.baseScaleY * b);
            } else {
                p.customData.sprite.scale.set(p.customData.baseScaleX, p.customData.baseScaleY);
            }
            return; // 【神级截断】如果不return，下面的物理坐标赋值又会把它盖掉！
        }

        // 【新增特效：浮空放大、拖拽偏移 与 速度形变】
        if (p.customData.isDragged && !isGameWon) {
            // 1. 浮空放大：比原本大 10%
            const liftScale = 1.1; 
            
            // 【核心优化：防遮挡偏移 (Finger Offset)】
            // 当玩家抓起积木时，为了防止手指/鼠标指针完全遮挡住中部的文字，
            // 我们让实际显示的图像(Container)在视觉上往【正上方】偏移。
            // 但这仅仅是视觉偏移，Matter.js 的物理碰撞体 (body) 依然在鼠标真实位置，保证吸附手感不变。
            p.customData.container.x = p.position.x; 
            p.customData.container.y = p.position.y - 60; // 提得更高一点，彻底避开手指遮挡
            
            // 2. 速度形变：根据物理引擎的线速度拉长或压扁
            // v.x 控制宽度，v.y 控制高度。速度越快，形变越夸张
            const stretchX = 1.0 + Math.abs(p.velocity.x) * 0.005;
            const stretchY = 1.0 + Math.abs(p.velocity.y) * 0.005;
            
            // 为了保持体积感不变 (Squash & Stretch 原则)，朝一个方向拉长，另一个方向就要相应变扁
            const finalScaleX = p.customData.baseScaleX * liftScale * stretchX / stretchY;
            const finalScaleY = p.customData.baseScaleY * liftScale * stretchY / stretchX;
            
            p.customData.shadowSprite.scale.set(finalScaleX * 1.05, finalScaleY * 1.05);
            p.customData.targetShadowAlpha = 0.4 - Math.min(Math.abs(p.velocity.x + p.velocity.y)*0.003, 0.15);
            // 抓起和拖拽时，阴影重心都在正下方，仅根据拖拽速度发生轻微物理形变错位
            p.customData.shadowSprite.x = 0 + p.velocity.x * 0.1;
            p.customData.shadowSprite.y = 15 + p.velocity.y * 0.1;
            
        } else if (!isGameWon) {
            // 没有被拖拽时的安全位置
            p.customData.container.x = p.position.x; // 松手后恢复与物理体对齐
            p.customData.container.y = p.position.y;
            p.customData.sprite.scale.set(p.customData.baseScaleX, p.customData.baseScaleY);
        }
    });

    for (let i = particles.length - 1; i >= 0; i--) {
        let p = particles[i];
        p.x += p.vx; p.y += p.vy;
        p.vy += 0.5; p.life -= p.decay; p.alpha = p.life; p.scale.set(p.life);
        if (p.life <= 0) { app.stage.removeChild(p); particles.splice(i, 1); }
    }

    if (isGameWon) {
        winAnimTick += 0.15;
    }
});

function checkWinCondition() {
    if (pieceRi.customData.isSnapped && pieceYue.customData.isSnapped) {
        isGameWon = true;
        targetBox.visible = false;
        playWinSound();               
        setTimeout(() => speakWord('明'), 500); 
        createExplosion(TARGET_CX, TARGET_CY);  
        pieces.forEach(p => p.customData.sprite.tint = 0xd35400);
    }
}
</script>
